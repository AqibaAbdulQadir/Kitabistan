# docker-compose.pg.yml (PostgreSQL version - we'll use later)
services:
  user-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=users_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
    volumes:
      - user-pg-data:/var/lib/postgresql/data

  user-service:
    build: ./user-service
    ports:
      - "8001:8001"
    environment:
      - DB_ENGINE=postgres
      - DB_HOST=user-db
      - DB_NAME=users_db
      - DB_USER=admin
      - DB_PASSWORD=secret
    depends_on:
      - user-db

volumes:
  user-pg-data: