<!doctype html>
<html lang="en">
  <head>
    <script>
      // Try Vercel first, fallback to Netlify
      const PRIMARY = 'https://kitabistan-g8eo.vercel.app';
      const FALLBACK = 'https://kitabistan.netlify.app';

      async function checkHealth(url) {
        try {
          const res = await fetch(url + '/api/health/');
          return res.ok;
        } catch {
          return false;
        }
      }

      (async () => {
        // Only run on primary site
        if (window.location.hostname.includes('vercel')) {
          const healthy = await checkHealth(PRIMARY);
          if (!healthy) {
            window.location.href = FALLBACK;
          }
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitabistan</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </body>
</html>
